name: 📋 General work item
description: A general work item (not a bug or enhancement)
type: "task"
labels:
  - "kind/task"
  - "needs-triage"
body:
  - type: markdown
    attributes:
      value: |
        Describe what needs to be done and why. Include links to related work if helpful.
  - type: textarea
    attributes:
      label: Task description
      description: |
        Please provide a description of the task.
      placeholder: |
        Describe the task. What needs to be done and why?
    validations:
      required: true
